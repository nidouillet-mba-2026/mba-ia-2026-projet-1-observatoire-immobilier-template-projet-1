name: "Scraping quotidien - Annonces Toulon"

on:
  schedule:
    - cron: "0 7 * * *"   # Tous les jours à 7h UTC (8h Paris)
  workflow_dispatch:       # Déclenchement manuel depuis l'onglet Actions

jobs:
  scrape:
    name: "Collecte + Enrichissement"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Scraping Bienici → Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python3 -m scraping.scraper_annonces

      - name: Enrichissement heuristique (annonces non enrichies)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 -m scraping.scoring || true
          python3 -m scraping.enrichissement || true
